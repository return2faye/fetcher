services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fetcher-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: fetcher-sandbox
    network_mode: none
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

volumes:
  qdrant_data:
